name: Wall of Hands validation

on:
  push:
    paths:
      - "wall-of-hands/**"
  pull_request:
    paths:
      - "wall-of-hands/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python wall-of-hands/validate_grip.py
